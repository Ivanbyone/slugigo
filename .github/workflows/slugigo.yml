name: Slugigo CI

on:
    pull_request:
        branches: [master, develop]
        types: [opened, reopened, edited]

jobs:

    lint:
        name: Static analysis
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Golang
              uses: actions/setup-go@v5
              with:
                go-version: "1.26"

            - name: Lint
              run: make lint

    test:
        name: Unit tests
        runs-on: ubuntu-latest
        needs: [lint]
        steps:
            - uses: actions/checkout@v4

            - name: Setup Golang
              uses: actions/setup-go@v5
              with:
                go-version: "1.26"

            - name: Unit
              run: make unit
              